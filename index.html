<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Unquiet Mind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=JetBrains+Mono:wght@300;400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #0f0f0f;
    --bg3: #141414;
    --accent: #c8703a;
    --accent2: #e8924e;
    --accent-dim: rgba(200,112,58,0.15);
    --accent-glow: rgba(200,112,58,0.08);
    --text: #e8e4dc;
    --text2: #a09890;
    --text3: #5a524a;
    --border: rgba(200,112,58,0.12);
    --border2: rgba(200,112,58,0.25);
    --red: #8b2020;
    --teal: #1a6b6b;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --body: 'Libre Baskerville', Georgia, serif;
    --mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
    cursor: none;
    overflow-x: hidden;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    opacity: 0.028;
    pointer-events: none;
    z-index: 9999;
  }

  /* CURSOR */
  #cursor {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, opacity 0.2s;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(200,112,58,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease-out, width 0.3s, height 0.3s, opacity 0.3s, border-color 0.3s;
  }
  body.cursor-hover #cursor { width: 12px; height: 12px; }
  body.cursor-hover #cursor-ring { width: 48px; height: 48px; border-color: rgba(200,112,58,0.8); }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 3rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
    backdrop-filter: blur(2px);
  }

  .nav-logo {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--text);
    text-transform: uppercase;
    opacity: 0.9;
  }
  .nav-logo span { color: var(--accent); }

  .nav-filters {
    display: flex;
    gap: 0.2rem;
    align-items: center;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    background: none;
    border: none;
    cursor: none;
    padding: 0.4rem 0.8rem;
    transition: color 0.2s;
    position: relative;
  }
  .filter-btn::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 50%; right: 50%;
    height: 1px;
    background: var(--accent);
    transition: left 0.3s, right 0.3s;
  }
  .filter-btn:hover { color: var(--text2); }
  .filter-btn:hover::after, .filter-btn.active::after { left: 0.8rem; right: 0.8rem; }
  .filter-btn.active { color: var(--accent); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  /* MOOD INDICATOR */
  #mood-indicator {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    transition: opacity 0.3s;
  }
  #mood-indicator .mood-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.6); }
  }

  /* ADMIN TOGGLE (hidden) */
  #admin-toggle {
    width: 4px;
    height: 4px;
    background: transparent;
    border: none;
    cursor: none;
    border-radius: 50%;
    transition: background 0.5s;
    opacity: 0.3;
  }
  #admin-toggle.hinted { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 3rem 4rem;
    position: relative;
    overflow: hidden;
  }

  #hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(transparent, var(--bg));
    pointer-events: none;
  }

  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1s 0.3s forwards;
  }

  .hero-title {
    font-family: var(--serif);
    font-size: clamp(4rem, 10vw, 9rem);
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s 0.5s forwards;
  }
  .hero-title em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-tagline {
    font-family: var(--body);
    font-size: 1rem;
    font-weight: 400;
    color: var(--text2);
    font-style: italic;
    max-width: 480px;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 1s 0.7s forwards;
  }

  #typewriter-text::after {
    content: '|';
    color: var(--accent);
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .hero-scroll {
    position: absolute;
    bottom: 3rem;
    left: 3rem;
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: fadeUp 1s 1.2s forwards;
  }
  .hero-scroll::before {
    content: '';
    width: 40px;
    height: 1px;
    background: var(--text3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* POSTS SECTION */
  #posts-section {
    padding: 0 3rem 8rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 3rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .post-count {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text3);
  }

  /* POST CARDS */
  #posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5px;
  }

  .post-card {
    background: var(--bg2);
    padding: 2.5rem;
    cursor: none;
    position: relative;
    overflow: hidden;
    transition: background 0.4s;
    opacity: 0;
    transform: translateY(20px);
  }

  .post-card.visible {
    animation: cardIn 0.6s ease forwards;
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .post-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .post-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 0;
    background: var(--accent);
    transition: height 0.4s ease;
  }

  .post-card:hover { background: var(--bg3); }
  .post-card:hover::before { opacity: 1; }
  .post-card:hover::after { height: 100%; }

  .post-tag {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .post-tag::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
    display: inline-block;
  }

  .post-title {
    font-family: var(--serif);
    font-size: 1.7rem;
    font-weight: 400;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
  }

  .post-excerpt {
    font-size: 0.875rem;
    color: var(--text2);
    line-height: 1.8;
    font-style: italic;
    margin-bottom: 2rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .post-date {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text3);
  }
  .read-arrow {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    transition: color 0.3s, transform 0.3s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .read-arrow::after {
    content: '→';
    display: inline-block;
    transition: transform 0.3s;
  }
  .post-card:hover .read-arrow { color: var(--accent); }
  .post-card:hover .read-arrow::after { transform: translateX(6px); }

  /* EMPTY STATE */
  #empty-state {
    text-align: center;
    padding: 6rem 2rem;
    display: none;
  }
  #empty-state h3 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 300;
    color: var(--text3);
    margin-bottom: 1rem;
    font-style: italic;
  }
  #empty-state p {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text3);
    letter-spacing: 0.1em;
  }

  /* === OVERLAY PANELS === */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .overlay.active {
    display: block;
  }
  .overlay.visible { opacity: 1; }

  /* READING VIEW */
  #reading-overlay {
    background: var(--bg);
    overflow-y: auto;
  }

  .reading-content {
    max-width: 680px;
    margin: 0 auto;
    padding: 8rem 2rem 8rem;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s 0.2s, transform 0.6s 0.2s;
  }
  .reading-content.loaded {
    opacity: 1;
    transform: translateY(0);
  }

  .reading-close {
    position: fixed;
    top: 2rem;
    right: 2.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    background: none;
    border: none;
    cursor: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .reading-close::before { content: '←'; }
  .reading-close:hover { color: var(--accent); }

  .reading-tag {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .reading-tag::before {
    content: '';
    width: 30px;
    height: 1px;
    background: var(--accent);
  }

  .reading-title {
    font-family: var(--serif);
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .reading-date {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 4rem;
    padding-bottom: 4rem;
    border-bottom: 1px solid var(--border);
  }

  .reading-body {
    font-family: var(--body);
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--text2);
    white-space: pre-wrap;
  }
  .reading-body p { margin-bottom: 1.5rem; }

  /* AUTH OVERLAY */
  #auth-overlay {
    background: rgba(10,10,10,0.97);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2rem;
  }

  .auth-box {
    width: 360px;
    text-align: center;
  }
  .auth-title {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 300;
    font-style: italic;
    color: var(--text2);
    margin-bottom: 0.5rem;
  }
  .auth-sub {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .auth-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border2);
    padding: 0.8rem 0;
    font-family: var(--mono);
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color 0.3s;
    caret-color: var(--accent);
  }
  .auth-input:focus { border-bottom-color: var(--accent); }
  .auth-error {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: #8b2020;
    margin-top: 1rem;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .auth-error.show { opacity: 1; }
  .auth-hint {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--text3);
    margin-top: 2rem;
    letter-spacing: 0.1em;
  }
  .auth-cancel {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    background: none;
    border: none;
    cursor: none;
    padding: 0.5rem;
    transition: color 0.2s;
  }
  .auth-cancel:hover { color: var(--text2); }

  /* ADMIN WRITE OVERLAY */
  #write-overlay {
    background: var(--bg);
    overflow-y: auto;
  }

  .write-ui {
    max-width: 760px;
    margin: 0 auto;
    padding: 5rem 2rem 8rem;
    opacity: 0;
    transition: opacity 0.5s 0.15s;
  }
  .write-ui.loaded { opacity: 1; }

  .write-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 3rem;
  }
  .write-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .write-label::before {
    content: '';
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  .write-actions {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .btn-ghost {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    background: none;
    border: none;
    cursor: none;
    padding: 0.6rem 1rem;
    transition: color 0.2s;
  }
  .btn-ghost:hover { color: var(--text2); }

  .btn-publish {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    border: none;
    cursor: none;
    padding: 0.7rem 1.8rem;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-publish:hover { background: var(--accent2); }
  .btn-publish:active { transform: scale(0.98); }

  .write-title-input {
    width: 100%;
    background: transparent;
    border: none;
    font-family: var(--serif);
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 400;
    color: var(--text);
    outline: none;
    margin-bottom: 1.5rem;
    caret-color: var(--accent);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .write-title-input::placeholder { color: var(--text3); font-style: italic; }

  .write-meta-row {
    display: flex;
    gap: 2rem;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .tag-selector {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .tag-opt {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    cursor: none;
    transition: all 0.2s;
  }
  .tag-opt:hover { border-color: var(--border2); color: var(--text2); }
  .tag-opt.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .write-body-input {
    width: 100%;
    min-height: 55vh;
    background: transparent;
    border: none;
    font-family: var(--body);
    font-size: 1rem;
    line-height: 1.9;
    color: var(--text2);
    outline: none;
    resize: none;
    caret-color: var(--accent);
    font-style: italic;
  }
  .write-body-input::placeholder { color: var(--text3); }

  .write-wordcount {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-top: 1.5rem;
  }

  /* ADMIN CONTROLS ON CARDS */
  .admin-controls {
    display: none;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  body.admin-mode .admin-controls { display: flex; }
  .admin-controls.show { display: flex; }
  .btn-delete {
    font-family: var(--mono);
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    background: rgba(139,32,32,0.08);
    border: 1px solid rgba(139,32,32,0.4);
    cursor: pointer;
    padding: 0.4rem 1rem;
    transition: all 0.2s;
    position: relative;
    z-index: 10;
  }
  .btn-delete:hover {
    color: #fff;
    background: #8b2020;
    border-color: #8b2020;
  }

  .admin-bar {
    display: none;
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg3);
    border: 1px solid var(--border2);
    padding: 0.8rem 2rem;
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    gap: 1.5rem;
    align-items: center;
    z-index: 150;
  }
  body.admin-mode .admin-bar { display: flex; }

  .btn-write {
    background: var(--accent);
    color: var(--bg);
    border: none;
    cursor: none;
    padding: 0.5rem 1.2rem;
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .btn-write:hover { background: var(--accent2); }

  .btn-exit-admin {
    background: none;
    color: var(--text3);
    border: none;
    cursor: none;
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .btn-exit-admin:hover { color: var(--text2); }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border2);
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 0.8rem 1.8rem;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 300;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text3); }

  /* No posts yet message */
  .no-posts {
    grid-column: 1 / -1;
    padding: 6rem 2rem;
    text-align: center;
  }
  .no-posts h3 {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 300;
    font-style: italic;
    color: var(--text3);
    margin-bottom: 1rem;
  }
  .no-posts p {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 0.12em;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo">
  <span id="blog-name">The Unquiet Mind</span>
  </div>
  <div class="nav-filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="thoughts">Thoughts</button>
    <button class="filter-btn" data-filter="rants">Rants</button>
    <button class="filter-btn" data-filter="life">Life</button>
    <button class="filter-btn" data-filter="creative">Creative</button>
  </div>
  <div class="nav-right">
    <div id="mood-indicator">
      <div class="mood-dot"></div>
      <span id="mood-text">somewhere between fine and falling apart</span>
    </div>
    <button id="admin-toggle" title=""></button>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-eyebrow">Est. wherever this started</div>
  <h1 class="hero-title">
    Words in the<br><em>dark.</em>
  </h1>
  <p class="hero-tagline">
    <span id="typewriter-text"></span>
  </p>
  <div class="hero-scroll">Scroll to read</div>
</section>

<!-- POSTS SECTION -->
<section id="posts-section">
  <div class="section-header">
    <span class="section-title">Entries</span>
    <span class="post-count" id="post-count-label">— loading —</span>
  </div>
  <div id="posts-grid"></div>
</section>

<!-- READING OVERLAY -->
<div class="overlay" id="reading-overlay">
  <button class="reading-close" id="reading-close">Back</button>
  <div class="reading-content" id="reading-content">
    <div class="reading-tag" id="reading-tag"></div>
    <h1 class="reading-title" id="reading-title"></h1>
    <div class="reading-date" id="reading-date"></div>
    <div class="reading-body" id="reading-body"></div>
  </div>
</div>

<!-- AUTH OVERLAY -->
<div class="overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="auth-title">Enter the dark room</div>
    <div class="auth-sub">Restricted access</div>
    <input type="password" class="auth-input" id="auth-input" placeholder="· · · · · ·" autocomplete="off" />
    <div class="auth-error" id="auth-error">Wrong password. Who are you?</div>
    <div class="auth-hint">press enter to authenticate</div>
  </div>
  <button class="auth-cancel" id="auth-cancel">← Leave</button>
</div>

<!-- WRITE OVERLAY -->
<div class="overlay" id="write-overlay">
  <div class="write-ui" id="write-ui">
    <div class="write-header">
      <div class="write-label">New Entry</div>
      <div class="write-actions">
        <button class="btn-ghost" id="write-cancel">Discard</button>
        <button class="btn-publish" id="publish-btn">Publish →</button>
      </div>
    </div>
    <input type="text" class="write-title-input" id="write-title" placeholder="A title that deserves to exist..." />
    <div class="write-meta-row">
      <div class="tag-selector" id="tag-selector">
        <button class="tag-opt selected" data-tag="thoughts">Thoughts</button>
        <button class="tag-opt" data-tag="rants">Rants</button>
        <button class="tag-opt" data-tag="life">Life</button>
        <button class="tag-opt" data-tag="creative">Creative</button>
      </div>
    </div>
    <textarea class="write-body-input" id="write-body" placeholder="Write something true..."></textarea>
    <div class="write-wordcount" id="word-count">0 words</div>
  </div>
</div>

<!-- ADMIN BAR -->
<div class="admin-bar">
  <span>Admin Mode</span>
  <button class="btn-write" id="new-post-btn">+ New Entry</button>
  <button class="btn-exit-admin" id="exit-admin-btn">Exit Admin</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ─── CONFIG ───────────────────────────────────────
  /*
  Demo password.
  Change before deployment.
  Frontend-only authentication is NOT secure.
*/
const BLOG_CONFIG = {
  name: "The Unquiet Mind",
  adminPassword: "CHANGE_ME"
};

document.getElementById("blog-name").textContent =
  BLOG_CONFIG.name;
  
  const ADMIN_PASSWORD = 'CHANGE_ME';
  const ADMIN_SHORTCUT = ['a', 'd', 'm']; // type 'adm' anywhere
  const TYPEWRITER_PHRASES = [
    'A place for thoughts that won\'t leave me alone.',
    'Honest, unedited, without apology.',
    'Written at ungodly hours, when the quiet gets loud.',
    'Some things are only true at 2am.',
    'Not for everyone. Especially not for you.',
  ];
  const MOODS = [
    'somewhere between fine and falling apart',
    'running on caffeine and questions',
    'watching the rain pretend it knows something',
    'in the middle of something unnameable',
    'listening to songs that know too much',
    'thinking about things that don\'t translate',
  ];

  // ─── STATE ────────────────────────────────────────
  let posts = JSON.parse(localStorage.getItem('unquiet_posts') || '[]');
  let currentFilter = 'all';
  let isAdmin = false;
  let currentPostId = null;
  let selectedTag = 'thoughts';
  let shortcutBuffer = [];
  let shortcutTimer = null;

  // Seed posts if empty
  if (posts.length === 0) {
    posts = [
      {
        id: 'seed-1',
        title: 'First light, still dark',
        tag: 'thoughts',
        date: new Date(Date.now() - 86400000 * 3).toISOString(),
        body: `There's a specific quality of silence that exists around 4am. Not peaceful — more like the world is holding its breath. I've been sitting with it instead of fighting it lately.

I keep thinking about how we move through days like tourists in our own lives. Snapping photos instead of standing still. Narrating instead of feeling.

This is me trying to stop narrating. Just a little.`
      },
      {
        id: 'seed-2',
        title: 'The problem with being a person',
        tag: 'rants',
        date: new Date(Date.now() - 86400000 * 7).toISOString(),
        body: `Everyone wants you to be legible. Classifiable. Put you in a category they already understand so they can stop paying attention.

I've spent years trying to be easier to understand and I think I've just made myself harder to find.

There's something to be said for opacity. Let them squint a little.`
      },
      {
        id: 'seed-3',
        title: 'Notes on being almost content',
        tag: 'life',
        date: new Date(Date.now() - 86400000 * 14).toISOString(),
        body: `I made tea this morning and sat by the window and didn't look at my phone for almost twenty minutes. This felt like a significant achievement.

The light was doing something complicated with the dust. I watched it for a while.

Maybe this is what people mean when they talk about presence. It doesn't feel profound. It feels like tea.`
      },
      {
        id: 'seed-4',
        title: 'On the craft of saying nothing well',
        tag: 'creative',
        date: new Date(Date.now() - 86400000 * 21).toISOString(),
        body: `Every sentence is a negotiation between what you want to say and what language will actually hold.

Some things collapse the moment you try to describe them. You reach for the word and the feeling vanishes — like trying to catch light in your hands. The word exists. The feeling existed. They refuse to be the same thing.

I've been writing around this for years. I'm not sure I've said anything yet. Maybe that's the point.`
      }
    ];
    savePosts();
  }

  function savePosts() {
    localStorage.setItem('unquiet_posts', JSON.stringify(posts));
  }

  // ─── CURSOR ───────────────────────────────────────
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  (function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  })();

  document.querySelectorAll('button, a, .post-card, input, textarea').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });

  // ─── TYPEWRITER ───────────────────────────────────
  const typeEl = document.getElementById('typewriter-text');
  let phraseIdx = 0, charIdx = 0, deleting = false, typeTimer;

  function typewrite() {
    const phrase = TYPEWRITER_PHRASES[phraseIdx];
    if (!deleting) {
      typeEl.textContent = phrase.slice(0, ++charIdx);
      if (charIdx === phrase.length) {
        deleting = true;
        typeTimer = setTimeout(typewrite, 2800);
      } else {
        typeTimer = setTimeout(typewrite, 55 + Math.random() * 40);
      }
    } else {
      typeEl.textContent = phrase.slice(0, --charIdx);
      if (charIdx === 0) {
        deleting = false;
        phraseIdx = (phraseIdx + 1) % TYPEWRITER_PHRASES.length;
        typeTimer = setTimeout(typewrite, 500);
      } else {
        typeTimer = setTimeout(typewrite, 28);
      }
    }
  }
  setTimeout(typewrite, 1400);

  // Random mood
  document.getElementById('mood-text').textContent = MOODS[Math.floor(Math.random() * MOODS.length)];

  // ─── RENDER POSTS ─────────────────────────────────
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function getExcerpt(text) {
    return text.split('\n').filter(l => l.trim()).slice(0, 2).join(' ').slice(0, 180);
  }

  function renderPosts() {
    const grid = document.getElementById('posts-grid');
    const filtered = currentFilter === 'all' ? posts : posts.filter(p => p.tag === currentFilter);
    const sorted = [...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));

    grid.innerHTML = '';
    document.getElementById('post-count-label').textContent = `${sorted.length} ${sorted.length === 1 ? 'entry' : 'entries'}`;

    if (sorted.length === 0) {
      grid.innerHTML = `<div class="no-posts">
        <h3>Nothing here yet.</h3>
        <p>${isAdmin ? 'Start writing — the blank page is waiting.' : 'Check back. Something is brewing.'}</p>
      </div>`;
      return;
    }

    sorted.forEach((post, i) => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.style.animationDelay = `${i * 0.1}s`;
      const postId = post.id;
      card.innerHTML = `
        <div class="post-tag">${post.tag}</div>
        <h2 class="post-title">${post.tag === 'creative' ? '<em>' + post.title + '</em>' : post.title}</h2>
        <p class="post-excerpt">${getExcerpt(post.body)}</p>
        <div class="post-meta">
          <span class="post-date">${formatDate(post.date)}</span>
          <span class="read-arrow">Read</span>
        </div>
        <div class="admin-controls" style="${isAdmin ? 'display:flex' : 'display:none'}">
          <button class="btn-delete" onclick="event.stopPropagation(); window.deletePost('${post.id}')">Delete Entry</button>
        </div>
      `;
      card.addEventListener('click', () => openPost(postId));
      grid.appendChild(card);

      requestAnimationFrame(() => {
        setTimeout(() => card.classList.add('visible'), i * 80);
      });
    });
  }

  // ─── FILTER ───────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderPosts();
    });
  });

  // ─── READING VIEW ─────────────────────────────────
  function openPost(id) {
    const post = posts.find(p => p.id === id);
    if (!post) return;
    currentPostId = id;

    document.getElementById('reading-tag').textContent = post.tag;
    document.getElementById('reading-title').textContent = post.title;
    document.getElementById('reading-date').textContent = formatDate(post.date);
    document.getElementById('reading-body').textContent = post.body;

    const overlay = document.getElementById('reading-overlay');
    overlay.style.display = 'block';
    overlay.scrollTop = 0;
    requestAnimationFrame(() => {
      overlay.classList.add('visible');
      setTimeout(() => {
        document.getElementById('reading-content').classList.add('loaded');
      }, 150);
    });
  }

  function closeReading() {
    const overlay = document.getElementById('reading-overlay');
    document.getElementById('reading-content').classList.remove('loaded');
    overlay.classList.remove('visible');
    setTimeout(() => { overlay.style.display = 'none'; }, 400);
  }

  document.getElementById('reading-close').addEventListener('click', closeReading);

  // ─── ADMIN SHORTCUT ───────────────────────────────
  document.addEventListener('keydown', e => {
    // Close overlays with ESC
    if (e.key === 'Escape') {
      if (document.getElementById('write-overlay').classList.contains('active')) closeWrite();
      else if (document.getElementById('auth-overlay').classList.contains('active')) closeAuth();
      else if (document.getElementById('reading-overlay').classList.contains('active')) closeReading();
      return;
    }

    // Shortcut buffer: type 'adm'
    if (!isAdmin && !document.getElementById('auth-overlay').classList.contains('active')) {
      const active = document.activeElement;
      if (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') return;

      shortcutBuffer.push(e.key.toLowerCase());
      if (shortcutBuffer.length > ADMIN_SHORTCUT.length) shortcutBuffer.shift();
      clearTimeout(shortcutTimer);
      shortcutTimer = setTimeout(() => { shortcutBuffer = []; }, 2000);

      if (shortcutBuffer.join('') === ADMIN_SHORTCUT.join('')) {
        shortcutBuffer = [];
        openAuth();
      }
    }
  });

  // Admin toggle (hidden dot)
  document.getElementById('admin-toggle').addEventListener('click', () => {
    if (isAdmin) {
      exitAdmin();
    } else {
      openAuth();
    }
  });

  // ─── AUTH ─────────────────────────────────────────
  function openAuth() {
    const overlay = document.getElementById('auth-overlay');
    overlay.style.display = 'flex';
    requestAnimationFrame(() => overlay.classList.add('visible'));
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-error').classList.remove('show');
    setTimeout(() => document.getElementById('auth-input').focus(), 300);
  }

  function closeAuth() {
    const overlay = document.getElementById('auth-overlay');
    overlay.classList.remove('visible');
    setTimeout(() => { overlay.style.display = 'none'; }, 400);
  }

  document.getElementById('auth-cancel').addEventListener('click', closeAuth);

  document.getElementById('auth-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = e.target.value;
      if (val === ADMIN_PASSWORD) {
        closeAuth();
        setTimeout(enterAdmin, 400);
      } else {
        document.getElementById('auth-error').classList.add('show');
        e.target.value = '';
        e.target.style.borderBottomColor = '#8b2020';
        setTimeout(() => {
          e.target.style.borderBottomColor = '';
          document.getElementById('auth-error').classList.remove('show');
        }, 2000);
      }
    }
  });

  // ─── ADMIN MODE ───────────────────────────────────
  function enterAdmin() {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    document.getElementById('admin-toggle').classList.add('hinted');
    showToast('Admin mode unlocked');
    renderPosts();
    setTimeout(() => {
      document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'flex');
    }, 50);
  }

  function exitAdmin() {
    isAdmin = false;
    document.body.classList.remove('admin-mode');
    document.getElementById('admin-toggle').classList.remove('hinted');
    showToast('Admin mode closed');
    renderPosts();
  }

  document.getElementById('exit-admin-btn').addEventListener('click', exitAdmin);
  document.getElementById('new-post-btn').addEventListener('click', openWrite);

  // ─── WRITE VIEW ───────────────────────────────────
  function openWrite() {
    document.getElementById('write-title').value = '';
    document.getElementById('write-body').value = '';
    document.getElementById('word-count').textContent = '0 words';
    selectedTag = 'thoughts';
    document.querySelectorAll('.tag-opt').forEach(b => {
      b.classList.toggle('selected', b.dataset.tag === selectedTag);
    });

    const overlay = document.getElementById('write-overlay');
    overlay.style.display = 'block';
    overlay.scrollTop = 0;
    requestAnimationFrame(() => {
      overlay.classList.add('visible');
      setTimeout(() => {
        document.getElementById('write-ui').classList.add('loaded');
        document.getElementById('write-title').focus();
      }, 200);
    });
  }

  function closeWrite() {
    const overlay = document.getElementById('write-overlay');
    document.getElementById('write-ui').classList.remove('loaded');
    overlay.classList.remove('visible');
    setTimeout(() => { overlay.style.display = 'none'; }, 400);
  }

  document.getElementById('write-cancel').addEventListener('click', closeWrite);

  document.querySelectorAll('.tag-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tag-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTag = btn.dataset.tag;
    });
  });

  document.getElementById('write-body').addEventListener('input', e => {
    const words = e.target.value.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById('word-count').textContent = `${words} word${words !== 1 ? 's' : ''}`;
  });

  document.getElementById('publish-btn').addEventListener('click', publishPost);

  function publishPost() {
    const title = document.getElementById('write-title').value.trim();
    const body = document.getElementById('write-body').value.trim();

    if (!title) {
      document.getElementById('write-title').focus();
      document.getElementById('write-title').style.borderBottom = '1px solid #8b2020';
      setTimeout(() => document.getElementById('write-title').style.borderBottom = '', 2000);
      return;
    }
    if (!body) {
      document.getElementById('write-body').focus();
      return;
    }

    const post = {
      id: 'post-' + Date.now(),
      title,
      tag: selectedTag,
      date: new Date().toISOString(),
      body
    };

    posts.unshift(post);
    savePosts();
    closeWrite();
    setTimeout(() => {
      renderPosts();
      showToast('Entry published');
    }, 500);
  }

  // ─── DELETE ───────────────────────────────────────
  function deletePost(id) {
    posts = posts.filter(p => p.id !== id);
    savePosts();
    renderPosts();
    showToast('Entry removed');
  }

  // ─── TOAST ────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ─── INIT ─────────────────────────────────────────
  renderPosts();
</script>
</body>
</html>
